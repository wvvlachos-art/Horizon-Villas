# Netlify deploy config.
# The live site is the static HTML at the repo root (index.html, about.html,
# horizon-tinos.html, etc.) — these are the current source of truth. There's no
# build step; Netlify just publishes the root directory.
# The Astro port in horizon-astro/ is kept in the repo but is no longer deployed.
[build]
  publish = "."
